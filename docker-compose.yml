# ──────────────────────────────────────────────────────────────────
# ScanAI — Docker Compose
# PostgreSQL, Redis, FastAPI API, Celery Worker, Web app, Admin app, MinIO
# ──────────────────────────────────────────────────────────────────

services:
  # ── Database ──
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: scanai
      POSTGRES_PASSWORD: scanai
      POSTGRES_DB: scanai
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scanai"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Message Broker ──
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend API ──
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://scanai:scanai@db:5432/scanai
      REDIS_URL: redis://redis:6379/0
      SCHEDULER_TOKEN: ${SCHEDULER_TOKEN:-scanai-scheduler-dev}
      SCAN_QUEUE_BACKEND: ${SCAN_QUEUE_BACKEND:-bullmq}
      SCAN_PIPELINE_PARALLELISM: ${SCAN_PIPELINE_PARALLELISM:-4}
      ALLOWED_ORIGINS: https://scanai.welocalhost.com,https://admin.scanai.welocalhost.com
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: scanai
      MINIO_SECRET_KEY: scanai-secret-key
      MINIO_BUCKET: scanai-reports
      MINIO_SECURE: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ── Celery Worker ──
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://scanai:scanai@db:5432/scanai
      REDIS_URL: redis://redis:6379/0
      SCHEDULER_TOKEN: ${SCHEDULER_TOKEN:-scanai-scheduler-dev}
      SCAN_PIPELINE_PARALLELISM: ${SCAN_PIPELINE_PARALLELISM:-4}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: scanai
      MINIO_SECRET_KEY: scanai-secret-key
      MINIO_BUCKET: scanai-reports
      MINIO_SECURE: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: celery -A tasks worker --loglevel=info --concurrency=2
    # Scanner tools need some privileges for naabu SYN scanning
    cap_add:
      - NET_RAW
      - NET_ADMIN

  # ── BullMQ Scheduled Scans + Email Dispatch ──
  scheduler:
    build:
      context: .
      dockerfile: apps/scheduler/Dockerfile
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379/0
      SCHEDULER_API_URL: http://api:8000
      SCHEDULER_TOKEN: ${SCHEDULER_TOKEN:-scanai-scheduler-dev}
      SCHEDULER_SYNC_INTERVAL_MS: 15000
      SCHEDULER_API_STARTUP_TIMEOUT_MS: 120000
      SCHEDULER_API_RETRY_DELAY_MS: 3000
      SCAN_DISPATCH_SYNC_INTERVAL_MS: ${SCAN_DISPATCH_SYNC_INTERVAL_MS:-3000}
      SCAN_DISPATCH_CONCURRENCY: ${SCAN_DISPATCH_CONCURRENCY:-2}
      SCAN_DISPATCH_RATE_LIMIT_MAX: ${SCAN_DISPATCH_RATE_LIMIT_MAX:-4}
      SCAN_DISPATCH_RATE_LIMIT_DURATION_MS: ${SCAN_DISPATCH_RATE_LIMIT_DURATION_MS:-60000}
      EMAIL_SYNC_INTERVAL_MS: 10000
      EMAIL_RATE_LIMIT_MAX: ${EMAIL_RATE_LIMIT_MAX:-10}
      EMAIL_RATE_LIMIT_DURATION_MS: ${EMAIL_RATE_LIMIT_DURATION_MS:-60000}
      EMAIL_CONCURRENCY: ${EMAIL_CONCURRENCY:-1}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy

  # ── Web App ──
  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""
        NEXT_PUBLIC_ADMIN_APP_URL: ${NEXT_PUBLIC_ADMIN_APP_URL:-https://admin.scanai.welocalhost.com}
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      INTERNAL_API_URL: http://api:8000
    depends_on:
      - api

  # ── Admin App ──
  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""
        NEXT_PUBLIC_WEB_APP_URL: ${NEXT_PUBLIC_WEB_APP_URL:-https://scanai.welocalhost.com}
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      INTERNAL_API_URL: http://api:8000
      NEXT_PUBLIC_WEB_APP_URL: ${NEXT_PUBLIC_WEB_APP_URL:-https://scanai.welocalhost.com}
    depends_on:
      - api

  # ── Object Storage (internal-only, for generated PDFs) ──
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    expose:
      - "9000"
      - "9001"
    environment:
      MINIO_ROOT_USER: scanai
      MINIO_ROOT_PASSWORD: scanai-secret-key
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
  miniodata:
    driver: local
