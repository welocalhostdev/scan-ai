# ──────────────────────────────────────────────────────────────────
# ScanAI — Docker Compose
# 5 services: PostgreSQL, Redis, FastAPI API, Celery Worker, Next.js Frontend
# ──────────────────────────────────────────────────────────────────

services:
  # ── Database ──
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: scanai
      POSTGRES_PASSWORD: scanai
      POSTGRES_DB: scanai
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scanai"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Message Broker ──
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend API ──
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://scanai:scanai@db:5432/scanai
      REDIS_URL: redis://redis:6379/0
      ALLOWED_ORIGINS: https://scanai.welocalhost.com
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ── Celery Worker ──
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://scanai:scanai@db:5432/scanai
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A tasks worker --loglevel=info --concurrency=2
    # Scanner tools need some privileges for naabu SYN scanning
    cap_add:
      - NET_RAW
      - NET_ADMIN

  # ── Frontend ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      INTERNAL_API_URL: http://api:8000
    depends_on:
      - api

volumes:
  pgdata:
    driver: local
