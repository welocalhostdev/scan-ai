# ──────────────────────────────────────────────────────────────────
# ScanAI — Docker Compose (Development)
# Hot-reload for backend + frontend, mounted source code volumes
# Usage: docker compose -f docker-compose-dev.yml up
# ──────────────────────────────────────────────────────────────────

services:
  # ── Database ──
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: scanai
      POSTGRES_PASSWORD: scanai
      POSTGRES_DB: scanai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scanai"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Message Broker ──
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend API (hot-reload via --reload) ──
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://scanai:scanai@db:5432/scanai
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: scanai
      MINIO_SECRET_KEY: scanai-secret-key
      MINIO_BUCKET: scanai-reports
      MINIO_SECURE: "false"
      PYTHONPATH: .
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001
    volumes:
      - ./backend:/app  # Mount source for hot-reload
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ── Celery Worker (auto-restart on file changes) ──
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://scanai:scanai@db:5432/scanai
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: scanai
      MINIO_SECRET_KEY: scanai-secret-key
      MINIO_BUCKET: scanai-reports
      MINIO_SECURE: "false"
      PYTHONPATH: .
    volumes:
      - ./backend:/app  # Mount source for live changes
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: >
      watchmedo auto-restart
        --directory=/app
        --pattern="*.py"
        --recursive
        -- celery -A tasks worker --loglevel=info --concurrency=2
    cap_add:
      - NET_RAW
      - NET_ADMIN

  # ── Web App (Next.js dev server with hot-reload) ──
  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: deps  # Only install deps, don't build production
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ""
      INTERNAL_API_URL: http://api:8000
      NEXT_PUBLIC_ADMIN_APP_URL: http://localhost:3001
    volumes:
      - .:/app                       # Mount monorepo source for HMR
      - /app/node_modules            # Preserve container node_modules
      - /app/apps/web/.next          # Preserve build cache
    depends_on:
      - api
    command: npx turbo run dev --filter=@scanai/web -- --hostname 0.0.0.0 --port 3000

  # ── Admin App (separate Next.js dev server) ──
  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      target: deps
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: ""
      INTERNAL_API_URL: http://api:8000
      NEXT_PUBLIC_WEB_APP_URL: http://localhost:3000
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/admin/.next
    depends_on:
      - api
    command: npx turbo run dev --filter=@scanai/admin -- --hostname 0.0.0.0 --port 3001

  # ── Object Storage (MinIO for PDFs) ──
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    environment:
      MINIO_ROOT_USER: scanai
      MINIO_ROOT_PASSWORD: scanai-secret-key
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
  miniodata:
    driver: local
